<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Landing</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        canvas {
            display: block;
        }

        /* Terminal Intro */
        .terminal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 15, 0.95);
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease-out, visibility 1s;
        }

        .terminal-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .terminal-content {
            font-family: 'Fira Code', monospace;
            text-align: left;
            max-width: 600px;
            padding: 20px;
        }

        .terminal-line {
            font-size: 14px;
            line-height: 1.8;
            color: #ff6b8a;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
        }

        .terminal-line.status {
            color: #94a3b8;
        }

        .terminal-line.encrypted {
            color: #e2e8f0;
            margin-top: 20px;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Decrypt Button */
        .decrypt-btn {
            margin-top: 30px;
            padding: 12px 32px;
            background: #dc2626;
            color: white;
            border: none;
            border-radius: 6px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            animation: fadeIn 0.5s 2s forwards;
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.3);
        }

        .decrypt-btn:hover {
            background: #ef4444;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(220, 38, 38, 0.4);
        }

        .decrypt-btn:active {
            transform: translateY(0);
        }

        .lock-icon {
            width: 14px;
            height: 14px;
        }

        .hint-text {
            margin-top: 12px;
            font-size: 11px;
            color: #64748b;
            font-family: 'Fira Code', monospace;
            opacity: 0;
            animation: fadeIn 0.5s 2.2s forwards;
        }

        /* Center glow */
        .center-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 100, 100, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 2;
            pointer-events: none;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
        }

        /* Floating particles */
        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 3;
            font-family: 'Fira Code', monospace;
            font-size: 12px;
            color: #ff6b8a;
            opacity: 0;
            animation: floatUp 4s ease-out forwards;
        }

        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(0) scale(0.5); }
            20% { opacity: 1; transform: translateY(-20px) scale(1); }
            100% { opacity: 0; transform: translateY(-100px) scale(0.8); }
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <canvas id="heartCanvas"></canvas>
    </div>

    <div class="center-glow"></div>

    <div class="terminal-overlay" id="terminalOverlay">
        <div class="terminal-content">
            <div class="terminal-line" style="animation-delay: 0.2s">
                <span style="color: #ff6b8a;">[system]</span> Initializing heart.PROTOCOL_v2.0...
            </div>
            <div class="terminal-line status" style="animation-delay: 0.6s">
                [status] Loading core modules...
            </div>
            <div class="terminal-line status" style="animation-delay: 1.0s">
                [status] Establishing emotional connection...
            </div>
            <div class="terminal-line encrypted" style="animation-delay: 1.4s">
                > One encrypted package found for you.
            </div>
            <div style="text-align: center;">
                <button class="decrypt-btn" id="decryptBtn" onclick="startHeartAnimation()">
                    <svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    Decrypt Message
                </button>
                <div class="hint-text">(or just click anywhere)</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animationId;
        let time = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Heart shape function
        function heartFunction(t) {
            // Parametric heart equation
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
            return { x, y };
        }

        class Particle {
            constructor(x, y, targetX, targetY, delay) {
                this.x = x;
                this.y = y;
                this.targetX = targetX;
                this.targetY = targetY;
                this.delay = delay;
                this.progress = 0;
                this.speed = 0.008 + Math.random() * 0.004;
                this.size = 10 + Math.random() * 6;
                this.opacity = 0;
                this.settled = false;
                this.floatOffset = Math.random() * Math.PI * 2;
                this.floatSpeed = 0.5 + Math.random() * 0.5;
                this.floatAmount = 2 + Math.random() * 3;
                this.color = this.getRandomColor();
            }

            getRandomColor() {
                const colors = [
                    '#ff6b8a', '#ff8fa3', '#ffb3c1', '#ff4757',
                    '#ff6348', '#ff7675', '#fd79a8', '#e84393',
                    '#ff9ff3', '#f368e0', '#ff6b81', '#ff4757'
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                if (this.delay > 0) {
                    this.delay--;
                    return;
                }

                if (!this.settled) {
                    this.progress += this.speed;
                    if (this.progress >= 1) {
                        this.progress = 1;
                        this.settled = true;
                    }

                    // Easing function
                    const ease = 1 - Math.pow(1 - this.progress, 3);
                    this.x = this.x + (this.targetX - this.x) * ease * 0.1;
                    this.y = this.y + (this.targetY - this.y) * ease * 0.1;

                    this.opacity = Math.min(1, this.progress * 2);
                } else {
                    // Floating animation when settled
                    this.opacity = 0.6 + Math.sin(time * this.floatSpeed + this.floatOffset) * 0.4;
                }
            }

            draw() {
                if (this.delay > 0) return;

                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.font = `${this.size}px 'Fira Code', monospace`;
                ctx.fillStyle = this.color;

                // Add glow effect
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 8;

                const drawX = this.settled ? this.targetX + Math.sin(time * this.floatSpeed + this.floatOffset) * this.floatAmount : this.x;
                const drawY = this.settled ? this.targetY + Math.cos(time * this.floatSpeed + this.floatOffset) * this.floatAmount : this.y;

                ctx.fillText('i love you', drawX, drawY);
                ctx.restore();
            }
        }

        function createHeartParticles() {
            particles = [];
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const scale = Math.min(canvas.width, canvas.height) / 45;

            // Create particles for heart outline and fill
            const numParticles = 800;

            for (let i = 0; i < numParticles; i++) {
                // Random position within heart shape
                const t = Math.random() * Math.PI * 2;
                const r = Math.sqrt(Math.random()); // Uniform distribution

                const heart = heartFunction(t);
                const x = heart.x * r * scale;
                const y = heart.y * r * scale;

                // Start from random positions outside
                const startX = centerX + (Math.random() - 0.5) * canvas.width * 1.5;
                const startY = centerY + (Math.random() - 0.5) * canvas.height * 1.5;

                particles.push(new Particle(
                    startX, 
                    startY, 
                    centerX + x, 
                    centerY + y, 
                    Math.random() * 100
                ));
            }

            // Add extra particles for denser center
            for (let i = 0; i < 200; i++) {
                const t = Math.random() * Math.PI * 2;
                const r = Math.sqrt(Math.random()) * 0.7;

                const heart = heartFunction(t);
                const x = heart.x * r * scale;
                const y = heart.y * r * scale;

                const startX = centerX + (Math.random() - 0.5) * 200;
                const startY = centerY + (Math.random() - 0.5) * 200;

                particles.push(new Particle(
                    startX, 
                    startY, 
                    centerX + x, 
                    centerY + y, 
                    50 + Math.random() * 50
                ));
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 15, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            time += 0.016;

            // Sort particles by y for depth effect
            particles.sort((a, b) => a.targetY - b.targetY);

            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            // Draw center glow text
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            ctx.save();
            ctx.globalAlpha = 0.8 + Math.sin(time * 2) * 0.2;
            ctx.font = "bold 24px 'Inter', sans-serif";
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.shadowColor = '#ff6b8a';
            ctx.shadowBlur = 20;
            ctx.fillText('I LOVE YOU', centerX, centerY);
            ctx.restore();

            animationId = requestAnimationFrame(animate);
        }

        function startHeartAnimation() {
            const overlay = document.getElementById('terminalOverlay');
            overlay.classList.add('hidden');

            createHeartParticles();
            animate();

            // Create floating particles
            setInterval(() => {
                if (Math.random() > 0.7) {
                    createFloatingParticle();
                }
            }, 500);
        }

        function createFloatingParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.textContent = 'i love you';
            particle.style.left = Math.random() * window.innerWidth + 'px';
            particle.style.top = window.innerHeight + 'px';
            particle.style.color = ['#ff6b8a', '#ff8fa3', '#ffb3c1', '#ff4757'][Math.floor(Math.random() * 4)];
            document.body.appendChild(particle);

            setTimeout(() => particle.remove(), 4000);
        }

        // Allow click anywhere to start
        document.getElementById('terminalOverlay').addEventListener('click', function(e) {
            if (e.target === this || e.target.classList.contains('terminal-content')) {
                startHeartAnimation();
            }
        });

        // Also start on spacebar or enter
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
                startHeartAnimation();
            }
        });
    </script>
</body>
</html>
