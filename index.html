<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Landing</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0f;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        canvas { display: block; }

        .terminal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 10, 15, 0.95);
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease-out, visibility 1s;
        }

        .terminal-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .terminal-content {
            font-family: 'Fira Code', monospace;
            text-align: left;
            max-width: 600px;
            padding: 20px;
        }

        .terminal-line {
            font-size: 14px;
            line-height: 1.8;
            color: #ff6b8a;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
        }

        .terminal-line.status { color: #94a3b8; }
        .terminal-line.encrypted { color: #e2e8f0; margin-top: 20px; }

        @keyframes fadeIn { to { opacity: 1; } }

        .decrypt-btn {
            margin-top: 30px;
            padding: 12px 32px;
            background: #dc2626;
            color: white;
            border: none;
            border-radius: 6px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            animation: fadeIn 0.5s 2s forwards;
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.3);
        }

        .decrypt-btn:hover {
            background: #ef4444;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(220, 38, 38, 0.4);
        }

        .hint-text {
            margin-top: 12px;
            font-size: 11px;
            color: #64748b;
            font-family: 'Fira Code', monospace;
            opacity: 0;
            animation: fadeIn 0.5s 2.2s forwards;
            text-align: center;
        }

        .center-glow {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(255, 80, 80, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 2;
            pointer-events: none;
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.4; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.7; }
        }

        .music-controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            display: none;
            align-items: center;
            gap: 15px;
            background: rgba(20, 20, 30, 0.8);
            padding: 10px 20px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 107, 138, 0.2);
        }

        .music-controls.visible { display: flex; }

        .music-btn {
            background: none;
            border: none;
            color: #ff6b8a;
            cursor: pointer;
            font-size: 20px;
            padding: 5px;
        }

        .music-info {
            font-family: 'Fira Code', monospace;
            font-size: 11px;
            color: #94a3b8;
        }

        .music-bar {
            width: 100px;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .music-progress {
            height: 100%;
            background: #ff6b8a;
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <canvas id="heartCanvas"></canvas>
    </div>

    <div class="center-glow"></div>

    <div class="terminal-overlay" id="terminalOverlay">
        <div class="terminal-content">
            <div class="terminal-line" style="animation-delay: 0.2s">
                <span style="color: #ff6b8a;">[system]</span> Initializing heart.PROTOCOL_v2.0...
            </div>
            <div class="terminal-line status" style="animation-delay: 0.6s">
                [status] Loading core modules...
            </div>
            <div class="terminal-line status" style="animation-delay: 1.0s">
                [status] Establishing emotional connection...
            </div>
            <div class="terminal-line encrypted" style="animation-delay: 1.4s">
                > One encrypted package found for you.
            </div>
            <div style="text-align: center;">
                <button class="decrypt-btn" id="decryptBtn" onclick="startHeartAnimation()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: inline-block; vertical-align: middle; margin-right: 5px;">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    Decrypt Message
                </button>
                <div class="hint-text">(or just click anywhere)</div>
            </div>
        </div>
    </div>

    <div class="music-controls" id="musicControls">
        <button class="music-btn" id="playBtn" onclick="toggleMusic()">▶</button>
        <span class="music-info">I Love You So - The Walters</span>
        <div class="music-bar"><div class="music-progress" id="musicProgress"></div></div>
    </div>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animationId;
        let time = 0;
        let lastTime = 0;
        let musicPlaying = false;
        let audio = null;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        function heartFunction(t) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
            return { x, y };
        }

        // Check if point is inside heart shape
        function isInsideHeart(px, py, scale) {
            // Convert to heart coordinate space
            const x = px / scale;
            const y = -py / scale;

            // Heart inequality: (x^2 + y^2 - 1)^3 - x^2 * y^3 <= 0
            const a = x * 0.1;
            const b = y * 0.1;
            const val = Math.pow(a*a + b*b - 1, 3) - a*a * b*b*b;
            return val <= 0;
        }

        class Particle {
            constructor(x, y, targetX, targetY, delay) {
                this.x = x;
                this.y = y;
                this.targetX = targetX;
                this.targetY = targetY;
                this.delay = delay;
                this.progress = 0;
                this.speed = 0.002 + Math.random() * 0.002;
                this.size = 11 + Math.random() * 4;
                this.opacity = 0;
                this.settled = false;
                this.floatOffset = Math.random() * Math.PI * 2;
                this.floatSpeed = 0.3 + Math.random() * 0.4;
                this.floatAmount = 1 + Math.random() * 1.5;
                this.color = this.getRandomColor();
                this.currentX = x;
                this.currentY = y;
            }

            getRandomColor() {
                const colors = [
                    '#ff6b8a', '#ff8fa3', '#ffb3c1', '#ff4757',
                    '#ff6348', '#ff7675', '#fd79a8', '#e84393'
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            update(dt) {
                if (this.delay > 0) {
                    this.delay -= dt * 60;
                    return;
                }

                if (!this.settled) {
                    this.progress += this.speed * dt * 60;
                    if (this.progress >= 1) {
                        this.progress = 1;
                        this.settled = true;
                        this.currentX = this.targetX;
                        this.currentY = this.targetY;
                    }

                    // Smooth easing - slow start, slow end
                    const ease = this.progress < 0.5 
                        ? 4 * this.progress * this.progress * this.progress 
                        : 1 - Math.pow(-2 * this.progress + 2, 3) / 2;

                    this.currentX = this.x + (this.targetX - this.x) * ease;
                    this.currentY = this.y + (this.targetY - this.y) * ease;
                    this.opacity = Math.min(1, this.progress * 2.5);
                } else {
                    // Gentle floating when settled
                    this.opacity = 0.4 + Math.sin(time * this.floatSpeed + this.floatOffset) * 0.35;
                }
            }

            draw() {
                if (this.delay > 0) return;

                const drawX = this.settled 
                    ? this.targetX + Math.sin(time * this.floatSpeed + this.floatOffset) * this.floatAmount 
                    : this.currentX;
                const drawY = this.settled 
                    ? this.targetY + Math.cos(time * this.floatSpeed + this.floatOffset) * this.floatAmount 
                    : this.currentY;

                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.font = this.size + 'px "Fira Code", monospace';
                ctx.fillStyle = this.color;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 4;
                ctx.fillText('i love you', drawX, drawY);
                ctx.restore();
            }
        }

        function createHeartParticles() {
            particles = [];
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const scale = Math.min(canvas.width, canvas.height) / 38;

            // FEWER particles - only 350 for cleaner heart shape
            const numParticles = 350;

            for (let i = 0; i < numParticles; i++) {
                // Use polar coordinates for better heart distribution
                const t = Math.random() * Math.PI * 2;
                const r = Math.pow(Math.random(), 0.7); // Bias toward edge for defined shape

                const heart = heartFunction(t);
                const x = heart.x * r * scale;
                const y = heart.y * r * scale;

                // Start from outside - random angle, far distance
                const angle = Math.random() * Math.PI * 2;
                const dist = 400 + Math.random() * 600;
                const startX = centerX + Math.cos(angle) * dist;
                const startY = centerY + Math.sin(angle) * dist;

                particles.push(new Particle(
                    startX, startY, 
                    centerX + x, centerY + y, 
                    Math.random() * 120
                ));
            }

            // Add some particles for the outline (edge of heart)
            for (let i = 0; i < 80; i++) {
                const t = (i / 80) * Math.PI * 2;
                const heart = heartFunction(t);
                const x = heart.x * 0.85 * scale;
                const y = heart.y * 0.85 * scale;

                const startX = centerX + (Math.random() - 0.5) * 200;
                const startY = centerY + (Math.random() - 0.5) * 200;

                particles.push(new Particle(
                    startX, startY, 
                    centerX + x, centerY + y, 
                    60 + Math.random() * 80
                ));
            }
        }

        function animate(currentTime) {
            const dt = Math.min((currentTime - lastTime) / 1000, 0.1);
            lastTime = currentTime;

            // Clear with very low opacity for smooth trails
            ctx.fillStyle = 'rgba(10, 10, 15, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            time += dt;

            // Update and draw particles
            particles.forEach(p => {
                p.update(dt);
                p.draw();
            });

            // Center text with soft glow
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            ctx.save();
            ctx.globalAlpha = 0.6 + Math.sin(time * 1.5) * 0.25;
            ctx.font = 'bold 28px "Inter", sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.shadowColor = '#ff6b8a';
            ctx.shadowBlur = 30;
            ctx.fillText('I LOVE YOU', centerX, centerY);
            ctx.restore();

            // Update music progress
            if (musicPlaying && audio) {
                const progress = (audio.currentTime / audio.duration) * 100;
                document.getElementById('musicProgress').style.width = progress + '%';
            }

            animationId = requestAnimationFrame(animate);
        }

        function startHeartAnimation() {
            document.getElementById('terminalOverlay').classList.add('hidden');
            createHeartParticles();
            lastTime = performance.now();
            requestAnimationFrame(animate);

            setTimeout(() => {
                document.getElementById('musicControls').classList.add('visible');
            }, 1500);
        }

        function toggleMusic() {
            const btn = document.getElementById('playBtn');

            if (!audio) {
                audio = new Audio('i-love-you-so.mp3');
                audio.loop = true;
                audio.volume = 0.5;
            }

            if (musicPlaying) {
                audio.pause();
                btn.textContent = '▶';
                musicPlaying = false;
            } else {
                audio.play().catch(e => {
                    alert('Music file not found.\n\nTo add music:\n1. Download "I Love You So - The Walters"\n2. Rename to: i-love-you-so.mp3\n3. Put in same folder as this HTML file');
                });
                btn.textContent = '⏸';
                musicPlaying = true;
            }
        }

        document.getElementById('terminalOverlay').addEventListener('click', function(e) {
            if (e.target === this) startHeartAnimation();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') startHeartAnimation();
        });
    </script>
</body>
          </html>
